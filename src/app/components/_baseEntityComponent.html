
<div class="main">
  <div class="container-fluid h-100">
    <div class="row h-100">
      <nav class="col-2 d-none d-md-block bg-light sidebar pt-3 pl-1 pr-1">
          <app-vertical-bar [entities]="entities" [entityType]="entityType()" [selectedEntity]="selectedEntity" [displayOptions]="displayOptions()"
            (updateGroup)="updateGroup($event)"
            (updateMember)="updateMember($event)"
            (addNewGroup)="addNewGroup($event)"
            (addNewMember)="addNewMember($event)"
            (deleteGroup)="deleteGroup($event)"
            (deleteMember)="deleteMember($event)"
            (select)="select($event)"
            (updateOrder)="updateOrder($event)"
            ></app-vertical-bar>
      </nav>
      <main role="main" class="col-10 px-4 pt-3 ">
        <div class="wrapper">
          <div class="d-flex justify-content-between border-bottom p-3">
            <h1 class="h4 text-muted text-nowrap">{{selectedEntity?.name}}</h1>
            <div>
              <button class="btn btn-primary mr-1">Continue writing</button>
              <button class="btn btn-primary mr-1">Edit details</button>
              <button class="btn btn-danger">Delete</button>              
            </div>
          </div>
         
        </div>
      </main>
    </div>
  </div>
</div>
