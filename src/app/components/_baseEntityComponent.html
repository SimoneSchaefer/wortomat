
<div class="d-flex h-100">
<app-vertical-bar [entities]="entities" [entityType]="entityType()" [selectedEntity]="selectedEntity"
  (updateGroup)="updateGroup($event)"
  (updateMember)="updateMember($event)"
  (addNewGroup)="addNewGroup($event)"
  (addNewMember)="addNewMember($event)"
  (deleteGroup)="deleteGroup($event)"
  (deleteMember)="deleteMember($event)"
  (select)="select($event)"
  (updateOrder)="updateOrder($event)"
  ></app-vertical-bar>

<div class="main-wrapper">
  <div class="container">
    <div *ngIf="!entities?.length" class="jumbotron w-100">
      <h1 class="display-6" translate>{{(entityType() | uppercase)  + '.NONE_YET_HEADER' | translate}}</h1>
      <span translate>{{(entityType() | uppercase)  + '.NONE_YET_INFO' | translate}}</span>
    </div>
    
    <div *ngIf="entities?.length&&!selectedEntity" class="jumbotron w-100">
      <h1 class="display-6">{{(entityType() | uppercase)  + '.NO_CHILDREN_YET_HEADER' | translate}}></h1>
      <span>{{(entityType() | uppercase)  + '.NO_CHILDREN_YET_INFO' | translate}}</span>
    </div>


    {{selectedEntity?.id}}

  </div>
</div>
</div>
