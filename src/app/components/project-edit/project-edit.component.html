<div class="container">
    <form #settingsForm="ngForm" *ngIf="baseModel">
      <div class="row w-100">
        <div class="col-3">
          <app-image-upload [baseEntity]="baseModel" [entityType]="'projects'"></app-image-upload>
        </div>
        <div class="col-9">
          <div class="form-group">
            <label for="name" translate>PROJECTS.NAME</label>
            <input type="text" class="form-control" id="name" required  [(ngModel)]="baseModel.name" name="name">
          </div>  
          <div class="form-group">
            <label for="summary" translate>PROJECTS.SUMMARY</label>
            <input type="text" class="form-control" id="summary"  required  [(ngModel)]="baseModel.summary" name="summary">
          </div>    
        </div>    
      </div> 
      <div class="row">
        <div class="col">
         <div class="button-group">
        <button class="btn btn-primary" (click)="save()" translate>
          <i class="fa fa-icon fa-save p-1"></i>
          <span translate>PROJECTS.SAVE</span>
        </button>
        <button class="btn btn-primary" (click)="goBack()" translate>
          <i class="fa fa-icon fa-times p-1"></i>
          <span translate>PROJECTS.CANCEL</span>
        </button>
      </div> 
        </div>
      </div>
         
    </form>
    </div>
