<div class="container">
    <form #settingsForm="ngForm" *ngIf="baseModel">

        <div class="form-group">
        <label for="name" translate>PARTS.NAME</label>
        <input type="text" class="form-control" id="name"  webkitdirectory directory required  [(ngModel)]="baseModel.name" name="name">
      </div>
  
        <div class="form-group">
        <label for="summary" translate>PARTS.SUMMARY</label>
        <input type="text" class="form-control" id="summary"  webkitdirectory directory required  [(ngModel)]="baseModel.summary" name="summary">
      </div>

        <div class="">
          <button class="btn btn-primary" (click)="save()" translate>PARTS.SAVE</button>
          <button class="btn btn-primary" (click)="goBack()" translate>PARTS.CANCEL</button>
        </div>
    </form>
    </div>
