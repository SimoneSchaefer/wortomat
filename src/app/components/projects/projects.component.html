<div class="container">
  <div *ngIf="!entities?.length" class="mb-5">
    <h1 class="display-4" translate>PROJECTS.NONE_YET_HEADER</h1>
    <span translate class="lead">PROJECTS.NONE_YET_INFO</span>
  </div>
  <div class="row">
    <div class="col-3 d-flex align-items-stretch">
      <div class="card w-100">
        <div class="card-body text-center">
          <a [routerLink]="['/projects/add']" class="btn btn-link btn-lg">
            <i class="fa fa-icon fa-plus pr-1"></i>
            <span translate>PROJECTS.NEW</span>
          </a>
        </div>
      </div>
    </div>
    <div class="col-3 d-flex align-items-stretch" *ngFor="let project of entities">
      <div class="card ">
        <app-optional-image [baseEntity]="project" [css]="'card-img-top'" [entityType]="'projects'"></app-optional-image>
        <div class="card-body">
          <h5 class="card-title">{{project.name}}</h5>
          <p class="card-text">{{project.summary}}</p>
        </div>
        <div class="card-footer text-muted">
          <div class="button-group">
          <button class="btn btn-link " (click)="open(project)" title="{{'PROJECTS.OPEN' | translate}}"><i class="fa fa-icon fa-folder-open"></i></button>
          <a  [routerLink]="'/projects/edit/' + project.id" class="btn btn-link "  title="{{'PROJECTS.EDIT' | translate}}"><i class="fa fa-icon fa-pen"></i></a>
          <button class="btn btn-link danger" (click)="deleteEntity(project)"   title="{{'PROJECTS.DELETE' | translate}}"><i class="fa fa-icon fa-trash"></i></button>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>
