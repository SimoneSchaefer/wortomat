<div class="container">
   <h1 translate>PROJECTS.HEADER</h1>

  <a [routerLink]="['/projects/add']" class="btn btn-primary" translate>PROJECTS.NEW</a>


  <ul class="list-group" *ngIf="entities?.length">
    <li  *ngFor="let ent of entities" class="list-group-item">
      <span class="d-flex flex-row">
        {{ent.name}}
        <button class="btn btn-primary" (click)="open(ent)" translate>PROJECTS.OPEN</button>
        <a  [routerLink]="'/projects/edit/' + ent.id" class="btn btn-primary" translate>PROJECTS.EDIT</a>
        <button class="btn btn-primary" (click)="deleteGroup(ent.id)" translate>PROJECTS.DELETE</button>
      </span>
    </li>
  </ul>

  <div *ngIf="!entities?.length" class="alert alert-info" translate>PROJECTS.NONE_YET</div>
</div>
