<div class="vertical-bar">
  <button (click)="addNewParentEntity()" class="btn btn-link btn-lg">
    <i class="fas fa-icon fa-plus pr-1"></i>
    {{'' + entityType + '.NEW' | uppercase | translate}}
  </button>
  <div *ngFor="let group of this.entities">
    <div class="groupcontainer">
      <h1 class="h6 group p-3 nav-item mb-0 border-bottom">
        <span class="clickable" (click)="toggle(group)" *ngIf="!editing(group)">
          <i class="fa fa-icon fa-chevron-down" *ngIf="visible(group)"></i>
          <i class="fa fa-icon fa-chevron-right" *ngIf="!visible(group)"></i>
          <span>
            {{group.name}}
          </span>
        </span>
      </h1>

      <span class="float-right group btn-group options w-100" *ngIf="!editing(group)" [class.hidden]="!visible(group)">
        <button class="btn btn-link button-icon" (click)="addNewChildEntity(group)"><i class="fa fa-icon fa-plus" ></i></button>
        <button class="btn btn-link button-icon" (click)="edit(group)"><i class="fa fa-icon fa-pen" ></i></button>
        <button class="btn btn-link button-icon" (click)="deleteParent(group)"><i class="fa fa-icon fa-times" ></i></button>
      </span>

      <span *ngIf="editing(group)" class="form-inline">
        <input class="form-control" type="text" [(ngModel)]="group.name" />
        <button class="btn btn-primary" (click)="updateParentEntityName(group)">
          <i class="fa fa-icon fa-check"></i>
        </button>
      </span>
    </div>
    <ul class="nav flex-column w-100" [class.hidden]="!visible(group)">
      <li class="nav-item pl-2 entity clickable" (click)="selectEntity(child)" *ngFor="let child of group.children" [class.active]="selectedEntity==child">
        <span class="text-uppercase bold">{{child.name}}</span>
        <div class="row ">
          <div class="col-12 summary">
            {{child.summary}}
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>
