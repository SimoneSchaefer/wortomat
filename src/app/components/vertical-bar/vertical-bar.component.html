<div class="sidebar-sticky scrollbar left">
  <ul class="nav flex-column"  cdkDropList [cdkDropListData]="entities" (cdkDropListDropped)="dropGroup($event)">
    <li class="nav-item border-bottom grabbable" *ngFor="let group of this.entities" cdkDropListGroup cdkDrag [cdkDragData]="group" >
      <h6 class="d-flex mb-0">
        <div class="d-flex btn-link text-left">
          <h6 class="h6 bold clickable btn btn-link">  
            <i (click)="toggle(group)" title="Close" class="fa fa-icon fa-chevron-down"  *ngIf="visible(group)"></i>
            <i (click)="toggle(group)" title="Open" class="fa fa-icon fa-chevron-right"  *ngIf="!visible(group)"></i>
          </h6>
          <div (click)="selectEntity(group)" class="h6 bold clickable btn btn-link"  [class.active]="isSelected(group)">
            {{group.name ? group.name : (entityType.toUpperCase() + '.UNTITLED') | translate}}          
          </div>
        </div>
      </h6>

      <!-- children-->
      <ul class="nav flex-column" *ngIf="visible(group)"  
          cdkDropList          
          [cdkDropListData]="group.children" 
          (cdkDropListDropped)="dropItem($event)"
          [cdkDropListConnectedTo]="getConnectedList()">
        <li class="nav-item d-flex small grabbable" *ngFor="let child of group.children" cdkDrag [cdkDragData]="child">
          <div (click)="selectEntity(child)" class="clickable btn-link text-left pl-4 py-1" [class.active]="isSelected(child)" >
            {{child.name ? child.name : (entityType.toUpperCase() + '.UNTITLED_CHILD') | translate}}
            <span class="text-muted" *ngIf="child.summary">- {{child.summary}}</span>
          </div>              
        </li>
      </ul>
    </li>
  </ul>
 </div>
