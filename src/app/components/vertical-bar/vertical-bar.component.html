<div class="vertical-bar">
  <button (click)="addNewParentEntity()" class="btn btn-link btn-lg">
    <i class="fas fa-icon fa-plus pr-1"></i>
    {{'' + entityType + '.NEW' | uppercase | translate}}
  </button>
  <div *ngFor="let group of this.entities">
    <div class="groupcontainer">

      <span class="float-right group btn-group options" *ngIf="!editing(group)">
        <button class="btn btn-link button-icon p-0 mr-2" (click)="addNewChildEntity(group)"><i class="fa fa-icon fa-plus" ></i></button>
        <button class="btn btn-link button-icon p-0 mr-2" (click)="editParent(group)"><i class="fa fa-icon fa-pen" ></i></button>
        <button class="btn btn-link button-icon p-0 mr-2" (click)="deleteParent(group)"><i class="fa fa-icon fa-times" ></i></button>
      </span>
      <h1 class="h6 group p-3 nav-item mb-0 border-bottom" *ngIf="!editing(group)">
        <span class="clickable" (click)="toggle(group)">
          <i class="fa fa-icon fa-chevron-down" *ngIf="visible(group)"></i>
          <i class="fa fa-icon fa-chevron-right" *ngIf="!visible(group)"></i>
          <span class="ml-2">
            <a (click)="edit(group)" class="clickable">{{group.name ? group.name : entityType.toUpperCase() + '.UNTITLED' | translate}}</a>
          </span>
        </span>
      </h1>
      <div *ngIf="editing(group)" class="form-inline inline-editing m-1">
       <input class="form-control pr-0" type="text" [(ngModel)]="currentValue"/>
       <div class="button-group mt-1 w-100">
         <button class="btn btn-primary" (click)="updateParentEntityName(group)">
          <i class="fa fa-icon fa-check"></i>
        </button>
        <button class="btn btn-primary" (click)="cancelEditingParentEntityName(group)">
          <i class="fa fa-icon fa-times"></i>
        </button>
       </div>

      </div>

     
    </div>
    <ul class="nav flex-column w-100" [class.hidden]="!visible(group)">
      <li class="nav-item pl-2 entity clickable" (click)="selectEntity(child)" *ngFor="let child of group.children" [class.active]="selectedEntity==child">
        <span class="text-uppercase bold">{{child.name}}</span>
        <div class="row ">
          <div class="col-12 summary">
            {{child.summary}}
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>

<div class="modal-mask" [class.hidden]="!inEditMode()"></div>
